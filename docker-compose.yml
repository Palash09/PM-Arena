services:
  postgres:
    image: postgres:16-alpine
    container_name: product-league-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: productleague
      POSTGRES_PASSWORD: productleague
      POSTGRES_DB: productleague
    ports:
      - "5432:5432"
    volumes:
      - product_league_data:/var/lib/postgresql/data

volumes:
  product_league_data:
